name: Automated Site Audit

'on':
  push:
    branches:
      - main
    paths-ignore:
      - output/tables/audit_report.json
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      strict_gate:
        description: 'Run strict audit gate (fail workflow if audit failures exist)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  run-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run audit script
        run: npm run audit

      - name: Commit updated audit report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- output/tables/audit_report.json; then
            echo "No audit report changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/tables/audit_report.json
          git commit -m "chore: update automated audit report"
          git push

  strict-quality-gate:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.strict_gate == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run strict audit gate
        run: AUDIT_STRICT=true npm run audit
