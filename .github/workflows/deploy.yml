name: Deploy dashboard to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        run: |
          mkdir -p _site
          cp -R dashboard/src/. _site/

          mkdir -p _site/data/processed
          mkdir -p _site/output/tables

          cp data/processed/nhl_master_analysis_panel.csv _site/data/processed/
          cp data/processed/nhl_signed_free_agents_clean.csv _site/data/processed/
          cp data/processed/nhl_team_mis_scores.csv _site/data/processed/
          cp data/processed/nhl_team_geography_variables.csv _site/data/processed/
          cp output/tables/model_comparison_summary.csv _site/output/tables/

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
