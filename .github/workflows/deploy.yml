name: Deploy dashboard to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        run: |
          copy_or_warn() {
            src="$1"
            dest_dir="$2"
            if [ -f "$src" ]; then
              cp "$src" "$dest_dir/"
            else
              echo "Warning: $src not found; skipping copy."
            fi
          }

          mkdir -p _site
          cp -R dashboard/src/. _site/

          mkdir -p _site/data/processed
          mkdir -p _site/output/tables

          cp data/processed/nhl_master_analysis_panel.csv _site/data/processed/

          # Performance file is useful for audit/data checks but may be absent in some branches.
          if [ -f data/processed/nhl_team_season_performance_clean.csv ]; then
            cp data/processed/nhl_team_season_performance_clean.csv _site/data/processed/
          else
            echo "Warning: data/processed/nhl_team_season_performance_clean.csv not found in repository."
            echo "teamTriCode,season_year,gamesPlayed,wins,losses,otLosses,points,pointPctg,goalsFor,goalsAgainst,goalDifferential,goalsForPctg,xGoalsPctg,conferenceAbbrev,divisionAbbrev,season_type" > _site/data/processed/nhl_team_season_performance_clean.csv
          fi

          # Signings file may be generated locally and not committed; keep deploy running
          # with a valid empty CSV so Team Detail still loads without hard failure.
          if [ -f data/processed/nhl_signed_free_agents_clean.csv ]; then
            cp data/processed/nhl_signed_free_agents_clean.csv _site/data/processed/
          else
            echo "Warning: data/processed/nhl_signed_free_agents_clean.csv not found in repository."
            echo "player_name,position,signing_team,previous_team,contract_value,aav,contract_years,ufa_rfa_type,spotrac_year,position_filter,transaction_type,same_team_resign,division_change,conference_change,aav_imputed,data_quality_note,movement_geography" > _site/data/processed/nhl_signed_free_agents_clean.csv
          fi

          copy_or_warn data/processed/nhl_team_mis_scores.csv _site/data/processed
          copy_or_warn data/processed/nhl_team_geography_variables.csv _site/data/processed

          copy_or_warn output/tables/model_comparison_summary.csv _site/output/tables
          copy_or_warn output/tables/quartile_summary.csv _site/output/tables
          copy_or_warn output/tables/quartile_examples.csv _site/output/tables
          copy_or_warn output/tables/geography_overall_summary.csv _site/output/tables

          if [ -f output/tables/audit_report.json ]; then
            cp output/tables/audit_report.json _site/output/tables/
          else
            echo "Warning: output/tables/audit_report.json not found; audit page will show unavailable state."
          fi

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
